<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mellowdee Technologies</title>
    <link rel="stylesheet" href="dist/output.css">

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700&display=swap">
</head>
<body>
    <header class="bg-primary text-surface px-10 py-5 flex items-center justify-between border-b border-surface/30">
        <!-- logo -->
        <div class="flex items-center justify-center gap-2">
            <!-- logo image -->
            <div class="border border-surface w-8 h-8 bg-secondary rounded-md">
                <!-- Replace with real logo -->
            </div>

            <span class="font-heading text-lg font-semibold text-secondary tracking-wide">
                Mellowdee
            </span>
            <span class="opacity-85 font-heading text-lg">
                Technologies
            </span>
        </div>

        <!-- navigation -->
        <nav class="flex gap-4 font-heading text-lg">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="#categories">Categories</a>
            <a href="#repairs">Repairs</a>
            <a href="#about.html">About</a>
        </nav>

        <button class="px-3 py-1 bg-green-400 rounded-md text-white font-semibold tracking-wide">
            Order
        </button>
    </header>

    <!-- hero -->
    <section class="section-container bg-primary">
        <span class="font-heading text-secondary">Home <span class="opacity-50 text-surface">/</span> <span class="text-surface">Shop</span></span>
        <h1 class="text-4xl text-surface font-heading mt-2 mb-2">
            All Products
        </h1>
        <p class="subtext text-surface">
            Browse our full catalogue - every product, every price
        </p>

    </section>

    <!-- shop section -->
    <section class="section-container">
        <!-- filter section  -->
        <div>
            <div class="flex justify-between">
                <h2 class="font-heading font-semibold tracking-wide">
                    Filters
                </h2>
                <button class="text-primary font-heading">
                    Clear All
                </button>
            </div>

            <!-- category filter  -->
            <fieldset class="mb-4">
                <legend class="font-heading text-primary font-semibold tracking-wide mb-2">
                    Category
                </legend>

                <div>
                    <input type="checkbox" id="all" name="category" value="all">
                    <label for="all">All</label>
                </div>
                <div>
                    <input type="checkbox" id="all" name="category" value="all" checked>
                    <label for="all">Laptops</label>
                </div>
                <div>
                    <input type="checkbox" id="all" name="category" value="all">
                    <label for="all">Desktops</label>
                </div>
                <div>
                    <input type="checkbox" id="all" name="category" value="all">
                    <label for="all">Monitors</label>
                </div>
                <div>
                    <input type="checkbox" id="all" name="category" value="all">
                    <label for="all">Printer</label>
                </div>
                <div>
                    <input type="checkbox" id="all" name="category" value="all">
                    <label for="all">Gaming</label>
                </div>
            </fieldset>

            <!-- price filter -->
            <div class="flex flex-col mb-4">
                <label for="priceRange" class="font-heading text-primary font-semibold tracking-wide mb-2">Price</label><br>
                <input type="range" id="priceRange">
            </div>

            <div>
                <fieldset>
                    <legend class="font-heading text-primary font-semibold tracking-wide mb-2">
                        Brand
                    </legend>

                    <div>
                        <input type="checkbox" id="hp" checked>
                        <label for="hp">HP</label>
                    </div>
                    <div>
                        <input type="checkbox" id="hp">
                        <label for="dell">Dell</label>
                    </div>
                    <div>
                        <input type="checkbox" id="hp">
                        <label for="lenovo">Lenovo</label>
                    </div>
                    <div>
                        <input type="checkbox" id="hp">
                        <label for="lg">LG</label>
                    </div>
                    <div>
                        <input type="checkbox" id="hp">
                        <label for="samsung">Samsung</label>
                    </div>
                    <div>
                        <input type="checkbox" id="hp">
                        <label for="hp">HP</label>
                    </div>
                </fieldset>
            </div>
        </div>
    </section>
    
</body>
</html>
